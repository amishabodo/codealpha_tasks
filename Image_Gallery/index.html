<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Image Gallery</title>
  <!-- Link to external CSS stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <h1>Visual Exploration</h1>
      <p>A responsive photography portfolio with custom interactive elements</p>
    </header>

    <!-- Category Filters -->
    <div class="filter-wrapper">
      <button class="filter-btn active" data-filter="all">All Items</button>
      <button class="filter-btn" data-filter="nature">Nature</button>
      <button class="filter-btn" data-filter="architecture">Architecture</button>
      <button class="filter-btn" data-filter="animals">Animals</button>
    </div>

    <!-- Gallery Grid -->
    <div class="gallery-grid" id="gallery">
      <!-- Item 1 -->
      <div class="gallery-item" data-category="nature">
        <div class="img-container">
          <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=600&q=80" alt="Misty Alpine Valley" data-full="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80">
        </div>
        <div class="item-info">
          <h3>Misty Alpine Valley</h3>
          <p>Nature</p>
        </div>
      </div>

      <!-- Item 2 -->
      <div class="gallery-item" data-category="architecture">
        <div class="img-container">
          <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=600&q=80" alt="Skyscraper Reflection" data-full="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=1200&q=80">
        </div>
        <div class="item-info">
          <h3>Skyscraper Reflection</h3>
          <p>Architecture</p>
        </div>
      </div>

      <!-- Item 3 -->
      <div class="gallery-item" data-category="animals">
        <div class="img-container">
          <img src="https://encrypted-tbn3.gstatic.com/licensed-image?q=tbn:ANd9GcRtTUo5xhSwHcrr1QJjXOgUJPmSNwG5Rt40hkiHFjfFCVLpBJD57lLZP8obWC0uNZNKg0ftJHlDxioWA98" alt="Majestic Male Lion Portrait" data-full="https://encrypted-tbn3.gstatic.com/licensed-image?q=tbn:ANd9GcRtTUo5xhSwHcrr1QJjXOgUJPmSNwG5Rt40hkiHFjfFCVLpBJD57lLZP8obWC0uNZNKg0ftJHlDxioWA98">
        </div>
        <div class="item-info">
          <h3>Majestic Lion</h3>
          <p>Animals</p>
        </div>
      </div>

      <!-- Item 4 -->
      <div class="gallery-item" data-category="nature">
        <div class="img-container">
          <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=600&q=80" alt="Sunlit Forest Trail" data-full="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1200&q=80">
        </div>
        <div class="item-info">
          <h3>Sunlit Forest Trail</h3>
          <p>Nature</p>
        </div>
      </div>

      <!-- Item 5 -->
      <div class="gallery-item" data-category="architecture">
        <div class="img-container">
          <img src="https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=600&q=80" alt="Minimalist Spiral Staircase" data-full="https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=1200&q=80">
        </div>
        <div class="item-info">
          <h3>Spiral Staircase</h3>
          <p>Architecture</p>
        </div>
      </div>

      <!-- Item 6 -->
      <!-- Item 6 (Fixed Link) -->
      
          <div class="gallery-item" data-category="animals">
        <div class="img-container">
          <img src="https://encrypted-tbn3.gstatic.com/licensed-image?q=tbn:ANd9GcSGLuYjShDd3NL883Xsib4H_c_pUOA1kZfjbfovj8vnDkZgC32YoLGFc88Uevo0gRE_ZuYuJWKSBbXi3G4" alt="Cute Red Panda on Branch" data-full="https://encrypted-tbn3.gstatic.com/licensed-image?q=tbn:ANd9GcSGLuYjShDd3NL883Xsib4H_c_pUOA1kZfjbfovj8vnDkZgC32YoLGFc88Uevo0gRE_ZuYuJWKSBbXi3G4">
        </div>
        <div class="item-info">
          <h3>Red Panda</h3>
          <p>Animals</p>
        </div>
      </div>
  <!-- Lightbox DOM Element -->
  <div class="lightbox" id="lightbox">
    <div class="lightbox-content">
      <button class="close-btn" id="closeBtn">&times;</button>
      <button class="nav-btn prev" id="prevBtn">&#10094;</button>
      <img src="" alt="" class="lightbox-img" id="lightboxImg">
      <div class="lightbox-caption" id="lightboxCaption"></div>
      <button class="nav-btn next" id="nextBtn">&#10095;</button>
    </div>
  </div>

  <!-- Link to external JS script file -->
  <script src="script.js"></script>
</body>
</html>
