<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Glass Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calc-container">
    <!-- Screen Display Segment -->
    <div class="display-screen">
      <div class="expression-log" id="expressionLog"></div>
      <div class="current-value" id="currentValue">0</div>
    </div>

    <!-- Keyboard Keypad Array -->
    <div class="keypad">
      <button class="btn action-btn" data-type="clear">AC</button>
      <button class="btn action-btn" data-type="delete">⌫</button>
      <button class="btn operator-btn" data-value="/">&divide;</button>
      <button class="btn operator-btn" data-value="*">&times;</button>

      <button class="btn num-btn" data-value="7">7</button>
      <button class="btn num-btn" data-value="8">8</button>
      <button class="btn num-btn" data-value="9">9</button>
      <button class="btn operator-btn" data-value="-">&minus;</button>

      <button class="btn num-btn" data-value="4">4</button>
      <button class="btn num-btn" data-value="5">5</button>
      <button class="btn num-btn" data-value="6">6</button>
      <button class="btn operator-btn" data-value="+">+</button>

      <button class="btn num-btn" data-value="1">1</button>
      <button class="btn num-btn" data-value="2">2</button>
      <button class="btn num-btn" data-value="3">3</button>
      <button class="btn equal-btn" data-type="equals">=</button>

      <button class="btn num-btn zero" data-value="0">0</button>
      <button class="btn num-btn" data-value=".">.</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
