<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.buttons{
    text-align:center;
    margin-bottom:20px;
}

.buttons button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:5px;
    background:#333;
    color:white;
    cursor:pointer;
    transition:.3s;
}

.buttons button:hover,
.buttons .active{
    background:orangered;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.image{
    overflow:hidden;
    border-radius:10px;
    cursor:pointer;
}

.image img{
    width:100%;
    height:250px;
    object-fit:cover;
    transition:.4s;
}

.image:hover img{
    transform:scale(1.1);
    filter:brightness(80%);
}

.lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.9);
    display:none;
    justify-content:center;
    align-items:center;
}

.lightbox img{
    width:80%;
    max-width:700px;
    border-radius:10px;
}

.close{
    position:absolute;
    top:20px;
    right:40px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

.prev,
.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:none;
    border:none;
    color:white;
    font-size:50px;
    cursor:pointer;
}

.prev{
    left:20px;
}

.next{
    right:20px;
}

@media(max-width:768px){

.gallery{
grid-template-columns:1fr;
}

.lightbox img{
width:95%;
}

.prev,.next{
font-size:35px;
}

}
</style>

</head>

<body>

<h1>Responsive Image Gallery</h1>

<div class="buttons">
<button class="filter-btn active" data-filter="all">All</button>
<button class="filter-btn" data-filter="nature">Nature</button>
<button class="filter-btn" data-filter="city">City</button>
<button class="filter-btn" data-filter="animals">Animals</button>
</div>

<div class="gallery">

<div class="image nature">
<img src="https://picsum.photos/id/1015/600/400">
</div>

<div class="image city">
<img src="https://picsum.photos/id/1011/600/400">
</div>

<div class="image animals">
<img src="https://picsum.photos/id/1025/600/400">
</div>

<div class="image nature">
<img src="https://picsum.photos/id/1039/600/400">
</div>

<div class="image city">
<img src="https://picsum.photos/id/1043/600/400">
</div>

<div class="image animals">
<img src="https://picsum.photos/id/237/600/400">
</div>

<div class="image nature">
<img src="https://picsum.photos/id/1056/600/400">
</div>

<div class="image city">
<img src="https://picsum.photos/id/1060/600/400">
</div>

</div>

<div class="lightbox">

<span class="close">&times;</span>

<button class="prev">&#10094;</button>

<img class="lightbox-img">

<button class="next">&#10095;</button>

</div>

<script>

const images=document.querySelectorAll(".gallery img");
const lightbox=document.querySelector(".lightbox");
const lightImg=document.querySelector(".lightbox-img");
const close=document.querySelector(".close");
const next=document.querySelector(".next");
const prev=document.querySelector(".prev");

let current=0;

images.forEach((img,index)=>{

img.addEventListener("click",()=>{

current=index;
showImage();
lightbox.style.display="flex";

});

});

function showImage(){

lightImg.src=images[current].src;

}

next.onclick=()=>{

current++;

if(current>=images.length){

current=0;

}

showImage();

}

prev.onclick=()=>{

current--;

if(current<0){

current=images.length-1;

}

showImage();

}

close.onclick=()=>{

lightbox.style.display="none";

}

window.onclick=(e)=>{

if(e.target==lightbox){

lightbox.style.display="none";

}

}

// Filter Buttons

const filterBtns=document.querySelectorAll(".filter-btn");
const galleryItems=document.querySelectorAll(".gallery .image");

filterBtns.forEach(btn=>{

btn.addEventListener("click",()=>{

filterBtns.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

let filter=btn.dataset.filter;

galleryItems.forEach(item=>{

if(filter=="all" || item.classList.contains(filter)){

item.style.display="block";

}

else{

item.style.display="none";

}

});

});

});

</script>

</body>
</html>
